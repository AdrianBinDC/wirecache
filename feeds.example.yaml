# Curated starter registry — copied to feeds.yaml on first run (feeds.yaml is gitignored).
# Maintain with the CLI (preferred over hand-editing):
#   uv run wirecache list-feeds [--category ai]
#   uv run wirecache add-feed --url URL --name NAME --categories ai,tech
#   uv run wirecache remove-feed --url URL
#   uv run wirecache update-feed --url URL [--name NAME] [--new-url URL]
#   uv run wirecache import-opml PATH [--category ai]
# Tag by primary beat: AI-primary → include `ai`; general tech → `tech` only.

